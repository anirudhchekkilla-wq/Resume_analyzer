{% extends "base.html" %}

{% block title %}Signup{% endblock %}

{% block extra_css %}
<style>

.auth-container {
    min-height: 100vh;
}

.fade-in {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center auth-container">

    <div class="card p-4 fade-in" style="width: 420px;">

        <h3 class="text-center mb-2">📝 Create Account</h3>
        <p class="text-center text-secondary mb-4">
            Start analyzing your resumes smarter 🚀
        </p>

        <form method="POST">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>

            <button class="btn btn-success w-100 mt-2">
                Signup
            </button>

        </form>

        <div class="text-center mt-3">
            <span class="text-secondary">Already have an account?</span><br>
            <a href="/login" class="text-info">Login here</a>
        </div>

    </div>

</div>

{% endblock %}
